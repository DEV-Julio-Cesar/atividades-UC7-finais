<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cinema — Reserva de Ingressos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Botão tema -->
  <button id="btn-tema" title="Alternar tema">🌙</button>

  <h1>🎬 Cinema — Reserva de Ingressos</h1>

  <!-- ===== FORMULÁRIO ===== -->
  <form id="form-reserva">
    <div class="form-group">
      <label for="nome">Nome do Cliente</label>
      <input type="text" id="nome" placeholder="Nome completo" required />
    </div>
    <div class="form-group">
      <label for="filme">Filme em Cartaz</label>
      <select id="filme" required>
        <option value="">Selecione um filme...</option>
        <option value="Missão Impossível 8">Missão Impossível 8</option>
        <option value="Deadpool & Wolverine">Deadpool & Wolverine</option>
        <option value="Duna: Parte 2">Duna: Parte 2</option>
        <option value="Divertida Mente 2">Divertida Mente 2</option>
        <option value="Alien: Romulus">Alien: Romulus</option>
      </select>
    </div>
    <div class="form-group">
      <label for="data">Data da Sessão</label>
      <input type="date" id="data" required />
    </div>
    <div class="form-group">
      <label for="horario">Horário</label>
      <select id="horario" required>
        <option value="14:00">🕑 14:00</option>
        <option value="17:00">🕔 17:00</option>
        <option value="20:00">🕗 20:00</option>
      </select>
    </div>
    <div class="form-group full-width">
      <label>Cadeiras Selecionadas <span id="contador-sel" class="contador-sel"></span></label>
      <div id="cadeiras-selecionadas" class="tags-box">
        <span class="placeholder-tag">Clique nas cadeiras no mapa abaixo (máx. 6)</span>
      </div>
    </div>
    <div class="form-group full-width total-box">
      <span>Total estimado:</span>
      <strong id="total-valor">R$ 0,00</strong>
    </div>
    <button type="button" class="btn-reservar" id="btn-reservar">Reservar</button>
  </form>

  <!-- ===== MAPA ===== -->
  <div class="mapa-wrapper">
    <h2>🪑 Mapa de Cadeiras</h2>
    <div class="mapa-info">
      <p class="legenda">
        <span class="leg leg-livre"></span> Livre
        <span class="leg leg-selecionada"></span> Selecionada
        <span class="leg leg-ocupada"></span> Ocupada
      </p>
      <p id="contador-mapa" class="contador-mapa">50 livres · 0 ocupadas</p>
    </div>
    <div id="mapa-cadeiras"></div>
    <div id="tooltip" class="tooltip"></div>
  </div>

  <!-- ===== TABELA ===== -->
  <div class="table-wrapper">
    <div class="table-header">
      <h2>📋 Reservas Realizadas</h2>
      <input type="text" id="filtro" placeholder="🔍 Buscar por nome ou filme..." class="input-filtro" />
    </div>
    <table id="tabela-reservas">
      <thead>
        <tr>
          <th data-col="0" class="sortable">Cliente <span class="sort-icon">↕</span></th>
          <th data-col="1" class="sortable">Filme <span class="sort-icon">↕</span></th>
          <th data-col="2" class="sortable">Data <span class="sort-icon">↕</span></th>
          <th data-col="3">Horário</th>
          <th data-col="4">Cadeiras</th>
          <th data-col="5" class="sortable">Total <span class="sort-icon">↕</span></th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody-reservas"></tbody>
    </table>
  </div>

  <!-- ===== MODAL COMPROVANTE ===== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div id="modal-conteudo" class="modal-conteudo"></div>
      <div class="modal-acoes">
        <button id="btn-imprimir" class="btn-imprimir">🖨️ Imprimir</button>
        <button id="btn-fechar"   class="btn-fechar">Fechar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
