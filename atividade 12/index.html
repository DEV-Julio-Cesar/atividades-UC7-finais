<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Nutricionista</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>🥗 Sistema da Nutricionista</h1>

  <!-- ===== FORMULÁRIO DE CADASTRO ===== -->
  <form id="form-paciente">
    <div class="form-group">
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Nome completo" required />
    </div>
    <div class="form-group">
      <label for="nascimento">Data de Nascimento</label>
      <input type="date" id="nascimento" required />
    </div>
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="email@exemplo.com" required />
    </div>
    <div class="form-group">
      <label for="telefone">Telefone</label>
      <input type="text" id="telefone" placeholder="(00) 00000-0000" required />
    </div>

    <!-- ===== ENDEREÇO COM VIACEP ===== -->
    <div class="form-group">
      <label for="cep">CEP</label>
      <div class="cep-group">
        <input type="text" id="cep" placeholder="00000-000" maxlength="9"
               onblur="consultarCEP()" />
        <button type="button" id="btn-cep" onclick="consultarCEP()">Consultar</button>
      </div>
    </div>
    <div class="form-group">
      <label for="logradouro">Logradouro</label>
      <input type="text" id="logradouro" placeholder="Rua / Avenida" />
    </div>
    <div class="form-group">
      <label for="numero">Número</label>
      <input type="text" id="numero" placeholder="Nº" />
    </div>
    <div class="form-group">
      <label for="bairro">Bairro</label>
      <input type="text" id="bairro" placeholder="Bairro" />
    </div>
    <div class="form-group">
      <label for="cidade">Cidade</label>
      <input type="text" id="cidade" placeholder="Cidade" />
    </div>
    <div class="form-group">
      <label for="estado-pac">Estado</label>
      <input type="text" id="estado-pac" placeholder="UF" maxlength="2" />
    </div>
    <div class="form-group">
      <label for="profissao">Profissão</label>
      <input type="text" id="profissao" placeholder="Ex: Professora" required />
    </div>
    <div class="form-group">
      <label for="altura">Altura (m)</label>
      <input type="number" id="altura" placeholder="Ex: 1.68" step="0.01" min="0.5" max="2.5" required />
    </div>
    <div class="form-group">
      <label for="peso">Peso (kg)</label>
      <input type="number" id="peso" placeholder="Ex: 65" step="0.1" min="1" max="300" required />
    </div>

    <button type="button" class="btn-cadastrar" id="btn-cadastrar">Cadastrar</button>
  </form>

  <!-- ===== TABELA DE PACIENTES ===== -->
  <div class="table-wrapper">
    <table id="tabela-pacientes">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Nascimento</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th>Logradouro</th>
          <th>Nº</th>
          <th>Bairro</th>
          <th>Cidade</th>
          <th>UF</th>
          <th>CEP</th>
          <th>Profissão</th>
          <th>Altura (m)</th>
          <th>Peso (kg)</th>
          <th>IMC</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody-pacientes"></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
