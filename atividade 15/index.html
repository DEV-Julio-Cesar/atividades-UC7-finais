<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 Filmes & Animes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>🎬 Filmes & Animes</h1>

  <!-- ===== ABAS ===== -->
  <div class="tabs">
    <button class="tab ativa" onclick="trocarAba('filmes')">🎬 Filmes</button>
    <button class="tab"       onclick="trocarAba('dragonball')">🐉 Dragon Ball</button>
  </div>

  <!-- ============================= -->
  <!-- ABA FILMES (OMDB)             -->
  <!-- ============================= -->
  <div id="aba-filmes">
    <div class="search-card">
      <div class="search-row">
        <div class="field">
          <label for="busca">Título</label>
          <input type="text" id="busca" placeholder="Ex: Batman, Matrix..." autocomplete="off" />
        </div>
        <div class="field field-sm">
          <label for="ano">Ano</label>
          <input type="number" id="ano" placeholder="2023" min="1888" max="2099" />
        </div>
      </div>
      <div class="search-row">
        <div class="field">
          <label for="tipo">Tipo</label>
          <select id="tipo">
            <option value="">Todos</option>
            <option value="movie">Filme</option>
            <option value="series">Série</option>
            <option value="episode">Episódio</option>
          </select>
        </div>
        <div class="field">
          <label for="enredo">Enredo</label>
          <select id="enredo">
            <option value="short">Curto</option>
            <option value="full">Completo</option>
          </select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button id="btn-buscar" onclick="buscarFilmes(1)">🔍 Buscar</button>
        </div>
      </div>
    </div>
    <div class="status-bar">
      <p id="contador"></p>
      <p id="erro" class="msg-erro"></p>
    </div>
    <div id="filmes-grid" class="grid"></div>
    <div id="paginacao-filmes" class="paginacao"></div>
  </div>

  <!-- ============================= -->
  <!-- ABA DRAGON BALL               -->
  <!-- ============================= -->
  <div id="aba-dragonball" class="hidden">
    <div class="search-card">
      <div class="search-row">
        <!-- Sub-abas: Personagens / Planetas -->
        <div class="field">
          <label>Seção</label>
          <select id="db-secao" onchange="trocarSecaoDB()">
            <option value="characters">👤 Personagens</option>
            <option value="planets">🌍 Planetas</option>
          </select>
        </div>
        <!-- Filtros de personagem -->
        <div class="field" id="db-filtro-raca">
          <label for="db-raca">Raça</label>
          <select id="db-raca">
            <option value="">Todas</option>
            <option value="Saiyan">Saiyan</option>
            <option value="Human">Human</option>
            <option value="Namekian">Namekian</option>
            <option value="Majin">Majin</option>
            <option value="Frieza Race">Frieza Race</option>
            <option value="Android">Android</option>
            <option value="God">God</option>
            <option value="Angel">Angel</option>
          </select>
        </div>
        <div class="field" id="db-filtro-afiliacao">
          <label for="db-afiliacao">Afiliação</label>
          <select id="db-afiliacao">
            <option value="">Todas</option>
            <option value="Z Fighter">Z Fighter</option>
            <option value="Red Ribbon Army">Red Ribbon Army</option>
            <option value="Army of Frieza">Army of Frieza</option>
            <option value="Villain">Villain</option>
          </select>
        </div>
        <!-- Filtro de planeta -->
        <div class="field hidden" id="db-filtro-destruido">
          <label for="db-destruido">Status</label>
          <select id="db-destruido">
            <option value="">Todos</option>
            <option value="true">Destruído</option>
            <option value="false">Existente</option>
          </select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button onclick="buscarDB(1)">🔍 Buscar</button>
        </div>
      </div>
    </div>
    <div class="status-bar">
      <p id="db-contador"></p>
      <p id="db-erro" class="msg-erro"></p>
    </div>
    <div id="db-grid" class="grid"></div>
    <div id="paginacao-db" class="paginacao"></div>
  </div>

  <!-- ===== MODAL ===== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <button class="btn-fechar-modal" id="btn-fechar-modal">✕</button>
      <div id="modal-corpo"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
